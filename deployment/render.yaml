# render.yaml — Render.com deployment configuration for the Flask backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: pmis-backend
    runtime: python
    region: singapore          # closest to India; change to frankfurt if needed
    plan: free                 # upgrade to starter ($7/mo) for always-on

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config deployment/gunicorn.conf.py "backend.app:create_app()"

    envVars:
      - key: MONGODB_URI
        sync: false            # Set this manually in the Render dashboard (secret)
      - key: MONGODB_DB
        value: pmis
      - key: SECRET_KEY
        generateValue: true    # Render auto-generates a secure random value
      - key: FLASK_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false            # Set to your Vercel URL after deploying frontend

    healthCheckPath: /api/health
    autoDeploy: true
