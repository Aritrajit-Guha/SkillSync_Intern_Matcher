services:
  - type: web
    name: skillsync-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --config backend/deployment/gunicorn.conf.py "backend.app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RECOMMENDATION_TOP_N
        value: "5"
    healthCheckPath: /api/health
    autoDeploy: true
