services:
  - type: web
    name: skillsync-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --config backend/deployment/gunicorn.conf.py "backend.app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: INTERNSHIP_SOURCE
        value: excel
      - key: INTERNSHIP_EXCEL_PATH
        value: backend/data/merged_normalized_dataset.xlsx
      - key: UPLOAD_STORAGE
        value: mongodb
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: pmis
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: RECOMMENDATION_TOP_N
        value: "5"
    healthCheckPath: /api/health
    autoDeploy: true
